name: Build

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  maven:
    name: Maven build
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build and test
        run: mvn --batch-mode -s .mvn/settings.xml verify

      - name: Stage packaged jar
        run: |
          mkdir -p staging
          cp target/open2jam-*.jar staging/

      - name: Upload packaged jar
        uses: actions/upload-artifact@v4
        with:
          name: open2jam-package
          path: staging/*.jar

      - name: Build macOS app image
        run: |
          set -euo pipefail
          rm -rf target/package-input target/jpackage
          mkdir -p target/package-input staging
          jar_file="$(find target -maxdepth 1 -type f -name 'open2jam-*.jar' ! -name 'original-*' | sort | head -n 1)"
          if [ -z "${jar_file}" ]; then
            echo "Packaged jar not found." >&2
            exit 1
          fi
          cp "${jar_file}" target/package-input/open2jam.jar
          jpackage \
            --type app-image \
            --name VosMac \
            --input target/package-input \
            --main-jar open2jam.jar \
            --main-class org.open2jam.Main \
            --java-options "--add-exports=java.desktop/com.sun.media.sound=ALL-UNNAMED" \
            --dest target/jpackage
          ditto -c -k --keepParent target/jpackage/VosMac.app staging/VosMac.app.zip

      - name: Upload macOS app image
        uses: actions/upload-artifact@v4
        with:
          name: VosMac-macos-app
          path: staging/VosMac.app.zip
