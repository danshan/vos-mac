<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1180" role="img" aria-label="VosMac icon candidate contact sheet">
  <defs>
    <linearGradient id="sheetBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#151922"/>
      <stop offset="1" stop-color="#090b10"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#000000" flood-opacity="0.36"/>
    </filter>
  </defs>
  <rect width="1920" height="1180" fill="url(#sheetBg)"/>
  <g font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" fill="#f8fafc">
    <text x="96" y="104" font-size="42" font-weight="700">VosMac app icon candidates</text>
    <text x="96" y="150" font-size="22" fill="#aeb8c7">macOS rounded-square app icon directions for Dock and .app packaging</text>
  </g>
  <g transform="translate(96 220)" filter="url(#cardShadow)">
    <rect width="390" height="520" rx="32" fill="#111827"/>
    <image href="vosmac-icon-a-lanes.svg" x="43" y="38" width="304" height="304"/>
    <text x="42" y="398" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="30" font-weight="700" fill="#f8fafc">A. Classic Lanes</text>
    <text x="42" y="438" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" fill="#aeb8c7">Most literal VOS/O2Jam highway.</text>
    <text x="42" y="468" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" fill="#aeb8c7">Strong Dock readability.</text>
  </g>
  <g transform="translate(534 220)" filter="url(#cardShadow)">
    <rect width="390" height="520" rx="32" fill="#111827"/>
    <image href="vosmac-icon-b-prism.svg" x="43" y="38" width="304" height="304"/>
    <text x="42" y="398" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="30" font-weight="700" fill="#f8fafc">B. Prism Mark</text>
    <text x="42" y="438" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" fill="#aeb8c7">More brand-like, less literal.</text>
    <text x="42" y="468" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" fill="#aeb8c7">Best if you want a symbol.</text>
  </g>
  <g transform="translate(972 220)" filter="url(#cardShadow)">
    <rect width="390" height="520" rx="32" fill="#111827"/>
    <image href="vosmac-icon-c-stage.svg" x="43" y="38" width="304" height="304"/>
    <text x="42" y="398" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="30" font-weight="700" fill="#f8fafc">C. Stage Highway</text>
    <text x="42" y="438" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" fill="#aeb8c7">Perspective, concert energy.</text>
    <text x="42" y="468" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" fill="#aeb8c7">Most dynamic direction.</text>
  </g>
  <g transform="translate(1410 220)" filter="url(#cardShadow)">
    <rect width="390" height="520" rx="32" fill="#111827"/>
    <image href="vosmac-icon-d-orbit.svg" x="43" y="38" width="304" height="304"/>
    <text x="42" y="398" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="30" font-weight="700" fill="#f8fafc">D. Rhythm Disc</text>
    <text x="42" y="438" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" fill="#aeb8c7">Music-first, softer identity.</text>
    <text x="42" y="468" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" fill="#aeb8c7">Least game-specific.</text>
  </g>
  <g transform="translate(96 840)" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <text x="0" y="0" font-size="26" font-weight="700" fill="#f8fafc">Recommendation</text>
    <text x="0" y="42" font-size="20" fill="#aeb8c7">Choose A for the safest game-readable icon. Choose C if you want the app to feel more premium and energetic.</text>
  </g>
</svg>
